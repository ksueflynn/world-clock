<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Choose a city</option>
        <option value="">London</option>
        <option value="">Seattle</option>
        <option value="">Austin</option>
        <option value="">Geneva</option>
      </select>

      <div class="city">
        <div>
          <h2>London💂</h2>

          <div class="date">March 25th 2026</div>
        </div>
        <div class="time">8:45 <small>AM</small></div>
      </div>

      <div class="city">
        <div>
          <h2>Seattle</h2>

          <div class="date">March 25th 2026</div>
        </div>
        <div class="time">8:45 <small>AM</small></div>
      </div>
    </div>

    <footer>
      This project was coded by
      <a href="https://github.com/ksueflynn" target="_blank"
        ><strong>Kelsey Flynn</strong></a
      >
      and is open sourced on
      <a href="https://github.com/ksueflynn/world-clock" target="_blank"
        >GitHub</a
      >
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
